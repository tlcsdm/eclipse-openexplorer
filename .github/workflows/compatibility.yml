name: Eclipse Version Compatibility

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility:
    strategy:
      fail-fast: false
      matrix:
        target:
          - 2024-06
          - 2024-09
          - 2024-12
          - 2025-03
          - 2025-06
          - 2025-09
          - 2025-12
          - 2026-03
    runs-on: ubuntu-latest
    name: Eclipse ${{ matrix.target }}

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'
    - name: Set up Maven
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: '3.9.9'
    - name: Override target platform with Eclipse ${{ matrix.target }}
      run: cp targets/${{ matrix.target }}.target target-platform.target
    - name: Build with Maven
      run: mvn -B clean verify -ntp
