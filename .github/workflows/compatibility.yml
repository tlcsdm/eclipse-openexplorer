name: Eclipse Version Compatibility

on:
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/dependabot.yml'
      - '.github/workflows/sync-gitee.yml'
      - '.github/workflows/update-site.yml'
      - '.github/workflows/release-build-upload.yml'
      - '.github/workflows/artifact.yml'
      - '.github/workflows/maven.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compatibility:
    strategy:
      fail-fast: false
      matrix:
        target:
          - 2024-06
          - 2024-09
          - 2024-12
          - 2025-03
          - 2025-06
          - 2025-09
          - 2025-12
          - 2026-03
    runs-on: windows-latest
    name: Eclipse ${{ matrix.target }}

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'maven'
    - name: Set up Maven
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: '3.9.9'
    - name: Build with Maven against Eclipse ${{ matrix.target }}
      run: mvn -B clean verify -ntp -Dtarget.platform.file=targets/${{ matrix.target }}.target
